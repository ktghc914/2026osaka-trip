<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機票・大阪 7 天 6 夜自由行</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">大阪<span>・</span>7天6夜</a>
    <button class="menu-toggle" id="menuToggle" aria-label="開啟選單">☰ 選單</button>
    <nav class="menu" id="mainMenu">
      <a href="flight.html" class="active">機票</a>
      <a href="hotel.html">飯店</a>
      <a href="index.html#checklist">購買清單</a>
      <a href="index.html#day1">第一日</a>
      <a href="index.html#day2">第二日</a>
      <a href="index.html#day3">第三日</a>
      <a href="index.html#day4">第四日</a>
      <a href="index.html#day5">第五日</a>
      <a href="index.html#day6">第六日</a>
      <a href="index.html#day7">第七日</a>
    </nav>
  </div>
</header>

<main>

  <div class="hero">
    <a class="back-link" href="index.html">← 回首頁</a>
    <h1>機票</h1>
    <p>去程／回程航班資訊</p>
  </div>

  <section class="page" id="flight">
    <div class="flight-grid">
      <div class="card">
        <span class="tag">去程</span>
        <h3>IT 212・2026/08/23</h3>
        <p>14:15 台北(桃園) TPE → 18:00 大阪 KIX（飛行時間 2 小時 45 分）</p>
        <p>座位：12A、12B（虎舒適）・17E、17F（虎厝邊）</p>
      </div>
      <div class="card">
        <span class="tag">回程</span>
        <h3>IT 213・2026/08/29</h3>
        <p>20:00 大阪 KIX → 21:50 台北(桃園) TPE（飛行時間 2 小時 50 分）</p>
        <p>座位：13A、13B（虎舒適）・20A、20B（虎厝邊）</p>
      </div>
    </div>
  </section>

</main>

<footer>大阪自由行手冊・僅供個人行程規劃使用</footer>

<script>
  // mobile menu toggle
  const toggle = document.getElementById('menuToggle');
  const menu = document.getElementById('mainMenu');
  toggle.addEventListener('click', () => menu.classList.toggle('open'));
  menu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => menu.classList.remove('open')));

  // active link highlight on scroll
  const sections = document.querySelectorAll('section.page');
  const links = menu.querySelectorAll('a');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.getAttribute('id');
        links.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + id));
      }
    });
  }, { rootMargin: '-40% 0px -55% 0px' });
  sections.forEach(s => observer.observe(s));
</script>

</body>
</html>
